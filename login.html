<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تسجيل الدخول - VELORA</title>

<!-- خط عربي أنيق -->
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Cairo', sans-serif;
    background: linear-gradient(135deg, #f5efe6, #b481b7);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.login-box {
    background: white;
    width: 380px;
    padding: 35px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    text-align: center;
}

h2 {
    margin-bottom: 20px;
    font-weight: 600;
    letter-spacing: 1px;
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 14px;
}

input:focus {
    outline: none;
    border-color: #d1a9ca;
}

label {
    font-size: 14px;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    background: black;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 15px;
    transition: 0.3s;
}

button:hover {
    background: #b89b72;
}

.message {
    margin-top: 15px;
    font-weight: 600;
    color: green;
}

</style>
</head>

<body>

<div class="login-box">
    <h2>تسجيل الدخول لإتمام الشراء</h2>

    <input type="email" id="email" placeholder="أدخل البريد الإلكتروني">
    <input type="password" id="password" placeholder="أدخل كلمة المرور">

    <label>
        <input type="checkbox" id="agree">
        أوافق على إتمام عملية الشراء
    </label>

    <button onclick="buy()">تأكيد الشراء</button>

    <div class="message" id="msg"></div>
</div>

<script>
function buy() {
    // 1. جلب العناصر
    const emailField = document.getElementById('email');
    const passwordField = document.getElementById('password');
    const agreeCheckbox = document.getElementById('agree');
    const messageDiv = document.getElementById('msg');
    const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    const passwordPattern = /^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{8,}$/;
    if (!emailPattern.test(emailField.value)) {
        messageDiv.innerText = "يرجى إدخال بريد إلكتروني صحيح (مثال: name@mail.com)";
        messageDiv.style.color = "#b481b7";
        return; 
    }

    if (!passwordPattern.test(passwordField.value)) {
        messageDiv.innerText = "كلمة المرور يجب أن تكون 8 خانات على الأقل وتحوي حرفاً ورقماً";
        messageDiv.style.color = "#b481b7";
        return;
    }

    if (!agreeCheckbox.checked) {
        messageDiv.innerText = "يجب أن توافقي على إتمام عملية الشراء أولاً";
        messageDiv.style.color = "#b481b7";
        return;
    }
    messageDiv.innerText = "تمت عملية الشراء بنجاح! شكراً لكِ.";
    messageDiv.style.color = "green";
    
    // هنا يمكنك إضافة كود إرسال البيانات للسيرفر
}
</script>

</body>
</html>
